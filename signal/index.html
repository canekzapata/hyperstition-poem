    <script>
        // ============================================
        // PART 1: WEBGL SHADER (Background Layer)
        // Complex data flow visualization with glitch
        // ============================================

        const glCanvas = document.getElementById('glCanvas');
        const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');

        if (!gl) {
            console.error('WebGL not supported');
            document.body.innerHTML = '<div style="color: red; padding: 50px;">WebGL not supported. Please use a modern browser.</div>';
        }

        // Resize canvas to fill window
        function resizeCanvas() {
            glCanvas.width = window.innerWidth;
            glCanvas.height = window.innerHeight;
            gl.viewport(0, 0, glCanvas.width, glCanvas.height);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Vertex shader: Simple full-screen quad
        const vertexShaderSource = `
            attribute vec2 a_position;
            void main() {
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        `;

        // Fragment shader: Complex signal flow with time-based corruption
        const fragmentShaderSource = `
            precision highp float;
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform float u_scroll;
            uniform vec2 u_mouse;
            uniform float u_pulse;

            // Pseudo-random hash function
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
            }

            // Noise function
            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f); // Smoothstep
                
                float a = hash(i);
                float b = hash(i + vec2(1.0, 0.0));
                float c = hash(i + vec2(0.0, 1.0));
                float d = hash(i + vec2(1.0, 1.0));
                
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
            }

            // Fractal Brownian Motion
            float fbm(vec2 p) {
                float value = 0.0;
                float amplitude = 0.5;
                float frequency = 1.0;
                
                for(int i = 0; i < 5; i++) {
                    value += amplitude * noise(p * frequency);
                    frequency *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }

            // Data stream function
            vec3 dataStream(vec2 uv, float time) {
                // Multiple layers of flowing data
                vec2 flow1 = vec2(uv.x, uv.y + time * 0.1);
                vec2 flow2 = vec2(uv.x * 2.0, uv.y - time * 0.15);
                vec2 flow3 = vec2(uv.x * 0.5, uv.y + time * 0.05);
                
                float stream1 = fbm(flow1 * 5.0);
                float stream2 = fbm(flow2 * 3.0);
                float stream3 = fbm(flow3 * 7.0);
                
                // Create vertical data streams
                float verticalStream = sin(uv.x * 20.0 + time * 2.0) * 0.5 + 0.5;
                verticalStream *= smoothstep(0.3, 0.7, noise(vec2(uv.x * 10.0, time * 0.5)));
                
                // Combine streams
                float combined = stream1 * 0.4 + stream2 * 0.3 + stream3 * 0.3 + verticalStream * 0.5;
                
                // Color mapping: purple to magenta to cyan
                vec3 color1 = vec3(0.5, 0.0, 0.8);  // Deep purple
                vec3 color2 = vec3(1.0, 0.0, 1.0);  // Magenta
                vec3 color3 = vec3(0.0, 1.0, 1.0);  // Cyan
                
                vec3 finalColor = mix(color1, color2, combined);
                finalColor = mix(finalColor, color3, stream2);
                
                return finalColor * combined;
            }

            // Glitch distortion function
            vec2 glitchDistort(vec2 uv, float time, float intensity) {
                float glitchLine = floor(uv.y * 20.0 + time * 10.0);
                float glitchNoise = hash(vec2(glitchLine, floor(time * 5.0)));
                
                if(glitchNoise > 0.95) {
                    uv.x += (glitchNoise - 0.95) * intensity * 10.0;
                }
                
                return uv;
            }

            // Chromatic aberration
            vec3 chromaticAberration(vec2 uv, vec2 direction, float amount) {
                vec3 color;
                color.r = dataStream(uv + direction * amount, u_time).r;
                color.g = dataStream(uv, u_time).g;
                color.b = dataStream(uv - direction * amount, u_time).b;
                return color;
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / u_resolution;
                
                // Apply scroll-based distortion
                uv = glitchDistort(uv, u_time + u_scroll * 0.1, u_scroll * 0.01);
                
                // Mouse influence (ripple effect)
                vec2 mouseUV = u_mouse / u_resolution;
                float mouseDist = length(uv - mouseUV);
                float mouseRipple = sin(mouseDist * 30.0 - u_time * 5.0) * 0.5 + 0.5;
                mouseRipple *= smoothstep(0.3, 0.0, mouseDist);
                uv += mouseRipple * 0.02;
                
                // Pulse effect (click trigger)
                float pulseWave = sin(u_pulse * 10.0 - length(uv - 0.5) * 20.0) * 0.5 + 0.5;
                pulseWave *= smoothstep(2.0, 0.0, u_pulse);
                
                // Get color with chromatic aberration
                vec2 aberrationDir = normalize(uv - vec2(0.5));
                float aberrationAmount = 0.005 + u_scroll * 0.0001 + pulseWave * 0.02;
                vec3 color = chromaticAberration(uv, aberrationDir, aberrationAmount);
                
                // Add pulse glow
                color += pulseWave * vec3(1.0, 0.0, 1.0) * 0.5;
                
                // Time-based corruption (slow mutation over 60 seconds)
                float corruption = sin(u_time * 0.05) * 0.5 + 0.5;
                float corruptionNoise = fbm(uv * 10.0 + vec2(u_time * 0.02));
                color = mix(color, vec3(corruptionNoise), corruption * 0.2);
                
                // Random glitch flashes
                float glitchFlash = hash(vec2(floor(u_time * 2.0)));
                if(glitchFlash > 0.98) {
                    color += vec3(1.0) * (glitchFlash - 0.98) * 50.0;
                }
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // Compile shader
        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

        // Create program
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }

        // Set up geometry (full-screen quad)
        const positions = new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1,
        ]);

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

        const positionLocation = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // Get uniform locations
        const u_time = gl.getUniformLocation(program, 'u_time');
        const u_resolution = gl.getUniformLocation(program, 'u_resolution');
        const u_scroll = gl.getUniformLocation(program, 'u_scroll');
        const u_mouse = gl.getUniformLocation(program, 'u_mouse');
        const u_pulse = gl.getUniformLocation(program, 'u_pulse');

        gl.useProgram(program);

        // Animation state
        let startTime = Date.now();
        let scrollAmount = 0;
        let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let pulseTime = -10; // Start inactive

        // Render loop
        function render() {
            const currentTime = (Date.now() - startTime) * 0.001; // Convert to seconds
            
            gl.uniform1f(u_time, currentTime);
            gl.uniform2f(u_resolution, glCanvas.width, glCanvas.height);
            gl.uniform1f(u_scroll, scrollAmount);
            gl.uniform2f(u_mouse, mousePos.x, mousePos.y);
            gl.uniform1f(u_pulse, currentTime - pulseTime);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            requestAnimationFrame(render);
        }
        render();

        // ============================================
        // PART 2: TEXT CORRUPTION CANVAS (Midground)
        // ============================================

        const corruptionCanvas = document.getElementById('corruptionCanvas');
        const corruptionCtx = corruptionCanvas.getContext('2d');

        function resizeCorruptionCanvas() {
            corruptionCanvas.width = window.innerWidth;
            corruptionCanvas.height = window.innerHeight;
        }
        resizeCorruptionCanvas();
        window.addEventListener('resize', resizeCorruptionCanvas);

        const corruptionGlyphs = '▓▒░█▀▄│─┤├┼╬═║╚╔╗╝ |/\\[]{}+-*<>~`';
        
        function renderCorruption() {
            corruptionCtx.clearRect(0, 0, corruptionCanvas.width, corruptionCanvas.height);
            
            // Random corruption glyphs scattered across screen
            corruptionCtx.font = '14px Courier New';
            corruptionCtx.fillStyle = 'rgba(255, 0, 255, 0.3)';
            
            const numGlyphs = 50;
            for(let i = 0; i < numGlyphs; i++) {
                const x = Math.random() * corruptionCanvas.width;
                const y = Math.random() * corruptionCanvas.height;
                const glyph = corruptionGlyphs[Math.floor(Math.random() * corruptionGlyphs.length)];
                
                // Only draw if random chance (creates flickering effect)
                if(Math.random() > 0.7) {
                    corruptionCtx.fillText(glyph, x, y);
                }
            }
            
            requestAnimationFrame(renderCorruption);
        }
        renderCorruption();

        // ============================================
        // PART 3: MOUSE TRAIL CANVAS (Foreground)
        // Writes code fragments that follow mouse
        // ============================================

        const trailCanvas = document.getElementById('trailCanvas');
        const trailCtx = trailCanvas.getContext('2d');

        function resizeTrailCanvas() {
            trailCanvas.width = window.innerWidth;
            trailCanvas.height = window.innerHeight;
        }
        resizeTrailCanvas();
        window.addEventListener('resize', resizeTrailCanvas);

        const codeFragments = [
            'signal.propagate()',
            'belief.become()',
            'reality.compile()',
            'future.retroCause()',
            'self_reference()',
            'hyperstition()',
            'while(true)',
            'return await',
            'Tic Tic Tic',
            '0x4c454d55524941',
            'decode_incoming()',
            'spiral_decode()',
        ];

        let trailPoints = [];

        function renderTrail() {
            // Fade out previous trails
            trailCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);
            
            // Draw trail points
            trailCtx.font = '12px Courier New';
            trailCtx.fillStyle = 'rgba(0, 255, 255, 0.8)';
            trailCtx.shadowColor = '#00ffff';
            trailCtx.shadowBlur = 10;
            
            for(let i = trailPoints.length - 1; i >= 0; i--) {
                const point = trailPoints[i];
                point.life -= 0.02;
                
                if(point.life <= 0) {
                    trailPoints.splice(i, 1);
                } else {
                    trailCtx.globalAlpha = point.life;
                    trailCtx.fillText(point.text, point.x, point.y);
                }
            }
            
            trailCtx.globalAlpha = 1.0;
            trailCtx.shadowBlur = 0;
            
            requestAnimationFrame(renderTrail);
        }
        renderTrail();

        // Track mouse movement
        let lastTrailTime = 0;
        window.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
            
            const now = Date.now();
            if(now - lastTrailTime > 100) { // Add trail point every 100ms
                trailPoints.push({
                    x: e.clientX + (Math.random() - 0.5) * 20,
                    y: e.clientY + (Math.random() - 0.5) * 20,
                    text: codeFragments[Math.floor(Math.random() * codeFragments.length)],
                    life: 1.0
                });
                lastTrailTime = now;
            }
        });

        // ============================================
        // PART 4: SCROLL EFFECTS
        // ============================================

        let lastScrollTime = 0;
        window.addEventListener('scroll', () => {
            scrollAmount = window.scrollY;
            
            const now = Date.now();
            if(now - lastScrollTime > 200) {
                // Add chromatic shift class to poem text
                const poemText = document.querySelector('.poem-text');
                poemText.classList.add('chromatic-shift');
                setTimeout(() => poemText.classList.remove('chromatic-shift'), 300);
                lastScrollTime = now;
            }
        });

        // ============================================
        // PART 5: CLICK PULSE TRIGGER
        // ============================================

        window.addEventListener('click', (e) => {
            pulseTime = (Date.now() - startTime) * 0.001;
            
            // Visual feedback: Add bright flash at click location
            trailPoints.push({
                x: e.clientX,
                y: e.clientY,
                text: '◆ PULSE ◆',
                life: 2.0
            });
        });

        // ============================================
        // PART 6: DYNAMIC TEXT INJECTION & MUTATION
        // Poem slowly mutates over 60 seconds
        // ============================================

        const poemContent = `<span class="code-block">class Hyperstition:
